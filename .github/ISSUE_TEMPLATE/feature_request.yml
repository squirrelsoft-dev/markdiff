name: Feature request
description: Suggest something markdiff should do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do
      description: >
        Describe the situation rather than the solution — it often turns
        out there is a better fit than the one either of us thought of.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you have in mind
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Anything you have tried or considered
